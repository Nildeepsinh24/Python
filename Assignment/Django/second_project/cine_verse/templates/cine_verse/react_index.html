{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CineVerse | {% if title %}{{ title }}{% else %}Premium Streaming{% endif %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#fff7f6",
                    "on-tertiary-container": "#faf8ff",
                    "background": "#121414",
                    "primary": "#ffb4aa",
                    "on-tertiary": "#2e3037",
                    "surface-container-low": "#1a1c1c",
                    "tertiary-container": "#71727a",
                    "on-background": "#e3e2e2",
                    "on-primary": "#690003",
                    "on-surface": "#e3e2e2",
                    "on-error-container": "#ffdad6",
                    "surface-container": "#1e2020",
                    "secondary": "#c4c5d6",
                    "on-primary-fixed-variant": "#930007",
                    "surface": "#121414",
                    "tertiary-fixed-dim": "#c5c6ce",
                    "inverse-surface": "#e3e2e2",
                    "on-surface-variant": "#e9bcb6",
                    "outline": "#af8782",
                    "inverse-primary": "#c0000c",
                    "error-container": "#93000a",
                    "tertiary-fixed": "#e2e2eb",
                    "primary-fixed-dim": "#ffb4aa",
                    "on-secondary-container": "#b2b4c4",
                    "surface-tint": "#ffb4aa",
                    "secondary-fixed-dim": "#c4c5d6",
                    "on-error": "#690005",
                    "primary-fixed": "#ffdad5",
                    "on-primary-fixed": "#410001",
                    "secondary-fixed": "#e0e1f2",
                    "surface-container-high": "#292a2a",
                    "surface-variant": "#343535",
                    "inverse-on-surface": "#2f3131",
                    "surface-dim": "#121414",
                    "tertiary": "#c5c6ce",
                    "surface-bright": "#38393a",
                    "secondary-container": "#434654",
                    "error": "#ffb4ab",
                    "primary-container": "#e50914",
                    "outline-variant": "#5e3f3b",
                    "on-secondary-fixed": "#181b27",
                    "surface-container-lowest": "#0d0e0f",
                    "on-tertiary-fixed-variant": "#45464e",
                    "on-secondary-fixed-variant": "#434654",
                    "on-tertiary-fixed": "#191b22",
                    "on-secondary": "#2d303d",
                    "surface-container-highest": "#343535"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-padding-desktop": "64px",
                    "unit": "8px",
                    "section-gap": "48px",
                    "container-padding-mobile": "20px"
            },
            "fontFamily": {
                    "body-lg": ["Manrope"],
                    "label-caps": ["Manrope"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Manrope"],
                    "display-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["64px", {"lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
            }
          },
        },
      }
    </script>
    <style>
        body { 
            background-color: #09090b; 
            color: #e3e2e2; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 20% 20%, rgba(229, 9, 20, 0.15) 0%, rgba(0, 0, 0, 0) 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(26, 29, 41, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .movie-card {
            transition: all 0.3s ease-in-out;
        }
        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.2);
            z-index: 10;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .featured-gradient {
            background: linear-gradient(0deg, #09090b 0%, rgba(9, 9, 11, 0.4) 50%, rgba(9, 9, 11, 0) 100%);
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 10px;
        }

        /* Drag styling from dashboard */
        .dragging {
            opacity: 0.6;
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            border-color: rgba(229, 9, 20, 0.4) !important;
            cursor: grabbing !important;
            z-index: 50;
            pointer-events: none;
        }
        .clickable-card {
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }
    </style>
    <!-- Inject compiled static CSS of the React Application -->
    <link rel="stylesheet" href="{% static 'dist/assets/index.css' %}">
</head>
<body class="font-body-md text-body-md overflow-x-hidden min-h-screen flex flex-col justify-between">
    <!-- Global Data Injection from Django Backend to React Client -->
    <script>
        window.CineVerseData = {
            page: "{{ page_name }}",
            user: "{{ user.username|default:'' }}",
            userAvatar: "{{ user.profile.avatar_url|default:'' }}",
            userEmail: "{{ user.email|default:'' }}",
            isSuperuser: {% if user.is_superuser %}true{% else %}false{% endif %},
            csrfToken: "{{ csrf_token }}",
            payload: {{ payload_json|safe }}
        };
    </script>

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- Load the compiled React Application script bundle -->
    <script type="module" src="{% static 'dist/assets/index.js' %}"></script>
</body>
</html>
