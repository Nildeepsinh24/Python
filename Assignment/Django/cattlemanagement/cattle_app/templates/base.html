<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cattle Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa, #e8f0fe);
      font-family: 'Poppins', sans-serif;
    }
    body {
        background: linear-gradient(135deg, #dbeafe, #f1f5f9, #e0f2fe);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
    }
    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .navbar {
      background-color: #0d6efd;
    }
    .navbar-brand {
      color: #fff !important;
      font-weight: 600;
    }
    .container {
      margin-top: 40px;
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    table {
      border-radius: 15px;
      overflow: hidden;
    }
    th {
      background-color: #0d6efd;
      color: white;
    }
    footer {
      margin-top: 60px;
      text-align: center;
      padding: 15px;
      background: #0d6efd;
      color: #fff;
      border-radius: 10px 10px 0 0;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">🐄 Cattle Management</a>
      <div class="collapse navbar-collapse justify-content-end">
        <ul class="navbar-nav">
          <li class="nav-item"><a href="{% url 'register_buyer' %}" class="nav-link text-light">Register Buyer</a></li>
          <li class="nav-item"><a href="{% url 'register_seller' %}" class="nav-link text-light">Register Seller</a></li>
          <li class="nav-item"><a href="{% url 'add_cattle' %}" class="nav-link text-light">Add Cattle</a></li>
          <li class="nav-item"><a href="{% url 'cattle_list' %}" class="nav-link text-light">View Cattle</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}
    {% endblock %}
  </div>

  <footer>
    © 2025 Cattle Management System | Developed by Neeldipsinh Jadeja
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
