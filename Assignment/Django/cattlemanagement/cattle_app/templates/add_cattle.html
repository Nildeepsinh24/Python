{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
  <h3 class="text-center text-primary mb-4">Add Cattle Details</h3>
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Cattle Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter cattle name" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Breed</label>
        <input type="text" name="breed" class="form-control" placeholder="Enter breed type" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" placeholder="Enter age" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Price</label>
        <input type="number" name="price" class="form-control" placeholder="Enter price" required>
      </div>
    </div>
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary px-4">Save Cattle</button>
    </div>
  </form>
</div>
{% endblock %}
