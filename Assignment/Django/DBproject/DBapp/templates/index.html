<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>
<body style="background-color: rgb(141, 228, 103);">
    <center>
        <H1>Hello To DB App Index Page</H1>
        <hr>
    </center>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Enter Name"><br><br>
            <input type="text" name="sub" placeholder="Enter Subject"><br><br>
            <input type="email" name="email" placeholder="Enter Email"><br><br>
            <input type="date" name="dob" placeholder="Enter DOB"><br><br>
            <input type="number" name="mobile" placeholder="Enter Phone Number"><br><br>
            <textarea placeholder="Address" name="address"></textarea><br><br>
            <input type="submit"><br><br>
        </form>
</body>
</html>
